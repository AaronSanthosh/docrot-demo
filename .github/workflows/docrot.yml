name: Docrot Detector
on: [push]
jobs:
  docrot:
    runs-on: ubuntu-latest
    permissions:
      issues: write
      contents: read
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: SuchiiJain/CS4485_Capstone@main
        with:
          backend_url: ${{ secrets.DOCROT_BACKEND_URL }}
